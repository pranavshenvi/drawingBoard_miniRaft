services:

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    depends_on:
      - node1
      - node2
      - node3
    networks:
      raftnet:
        ipv4_address: 172.28.0.10

  node1:
    build: ./replica
    container_name: node1
    environment:
      - NODE_ID=1
      - PORT=8001
    networks:
      raftnet:
        ipv4_address: 172.28.0.2

  node2:
    build: ./replica
    container_name: node2
    environment:
      - NODE_ID=2
      - PORT=8002
    networks:
      raftnet:
        ipv4_address: 172.28.0.3

  node3:
    build: ./replica
    container_name: node3
    environment:
      - NODE_ID=3
      - PORT=8003
    networks:
      raftnet:
        ipv4_address: 172.28.0.4

networks:
  raftnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
