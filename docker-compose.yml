version: "3"

services:

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - replica1
      - replica2
      - replica3
      - replica4
      - replica5
    environment:
      - REPLICAS=replica1:5001,replica2:5002,replica3:5003,replica4:5004,replica5:5005

  replica1:
    build: ./replica
    environment:
      - NODE_ID=1
      - PORT=5001
      - PEERS=replica2:5002,replica3:5003,replica4:5004,replica5:5005
    ports:
      - "5001:5001"

  replica2:
    build: ./replica
    environment:
      - NODE_ID=2
      - PORT=5002
      - PEERS=replica1:5001,replica3:5003,replica4:5004,replica5:5005
    ports:
      - "5002:5002"

  replica3:
    build: ./replica
    environment:
      - NODE_ID=3
      - PORT=5003
      - PEERS=replica1:5001,replica2:5002,replica4:5004,replica5:5005
    ports:
      - "5003:5003"

  replica4:
    build: ./replica
    environment:
      - NODE_ID=4
      - PORT=5004
      - PEERS=replica1:5001,replica2:5002,replica3:5003,replica5:5005
    ports:
      - "5004:5004"

  replica5:
    build: ./replica
    environment:
      - NODE_ID=5
      - PORT=5005
      - PEERS=replica1:5001,replica2:5002,replica3:5003,replica4:5004
    ports:
      - "5005:5005"
