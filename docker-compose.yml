version: "3"

services:

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - replica1
      - replica2
      - replica3

  replica1:
    build: ./replica
    environment:
      - NODE_ID=1
      - PORT=5001
    ports:
      - "5001:5001"

  replica2:
    build: ./replica
    environment:
      - NODE_ID=2
      - PORT=5002
    ports:
      - "5002:5002"

  replica3:
    build: ./replica
    environment:
      - NODE_ID=3
      - PORT=5003
    ports:
      - "5003:5003"